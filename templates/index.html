<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADS Project - DevSecOps Roadmap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-dark text-white">
                <h2 class="mb-0">DevSecOps Pipeline - Week 1 Roadmap</h2>
            </div>
            <div class="card-body">
                <p class="lead">Project Aim: Automating security validation in CI/CD pipelines.</p>
                <table class="table table-hover mt-4">
                    <thead class="table-dark">
                        <tr>
                            <th>Step</th>
                            <th>Task</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for item in tasks %}
                        <tr>
                            <td>{{ item.step }}</td>
                            <td>{{ item.task }}</td>
                            <td>
                                <span class="badge {% if item.status == 'Completed' %}bg-success{% elif item.status == 'In Progress' %}bg-warning{% else %}bg-secondary{% endif %}">
                                    {{ item.status }}
                                </span>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
